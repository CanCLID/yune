# Rime schema settings
# encoding: utf-8

schema:
  schema_id: cangjie5
  name: 倉頡五代
  version: "2023.11.03"
  author:
    - 發明人 朱邦復先生
  description: |
    倉頡五代補完計畫
    專案網址：https://github.com/Jackchows/Cangjie5
    原碼表為「倉頡之友·馬來西亞」發佈的「倉頡平台2012」軟件所含「五倉世紀」碼表
    網址：www.chinesecj.com

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: full_shape
    states: [ 半形, 全形 ]
  - name: simplification
    states: [ 繁體, 简体 ]
    reset: 0
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
  filters:
    - dictionary_lookup_filter
    - simplifier@output_hk2s
    - simplifier@output_t2s
    - simplifier@output_s2t
    - simplifier@output_t2tw
    - simplifier@output_s2tw
    - simplifier@output_tw2s
    - simplifier@output_tw2t

dictionary_lookup_filter:
  dictionary: jyut6ping3_scolar

output_hk2s:
  option_name: output_hk2s
  opencc_config: hk2s.json

output_t2s:
  option_name: output_t2s
  opencc_config: t2s.json

output_s2t:
  option_name: output_s2t
  opencc_config: s2t.json

output_t2tw:
  option_name: output_t2tw
  opencc_config: t2tw.json

output_s2tw:
  option_name: output_s2tw
  opencc_config: s2tw.json

output_tw2s:
  option_name: output_tw2s
  opencc_config: tw2s.json

output_tw2t:
  option_name: output_tw2t
  opencc_config: tw2t.json

menu:
  __patch: include:/no_candidate_selection

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"

translator:
  dictionary: cangjie5
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: false
  comment_format:
    - 'xform/^/\v/'
    - "xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符～|"
  __patch:
    - common:/show_cangjie_roots?
    - common:/show_full_code?

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default

__patch:
  - common:/separate_candidates?
