# Rime schema
# encoding: utf-8

__include: template:/

schema:
  schema_id: luna_pinyin
  name: 朙月拼音
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    Rime 預設的拼音輸入方案。
    參考以下作品而創作：
      * CC-CEDICT
      * Android open source project
      * Chewing - 新酷音
      * opencc - 開放中文轉換

menu:
  __patch: include:/no_candidate_selection

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: full_shape
    states: [ 半形, 全形 ]
  - name: simplification
    states: [ 繁體, 简体 ]
    reset: 0
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@reverse_lookup
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - script_translator
  filters:
    - charset_filter
    - simplifier@output_hk2s
    - simplifier@output_t2s
    - simplifier@output_s2t
    - simplifier@output_t2tw
    - simplifier@output_s2tw
    - simplifier@output_tw2s
    - simplifier@output_tw2t

output_hk2s:
  option_name: output_hk2s
  opencc_config: hk2s.json

output_t2s:
  option_name: output_t2s
  opencc_config: t2s.json

output_s2t:
  option_name: output_s2t
  opencc_config: s2t.json

output_t2tw:
  option_name: output_t2tw
  opencc_config: t2tw.json

output_s2tw:
  option_name: output_s2tw
  opencc_config: s2tw.json

output_tw2s:
  option_name: output_tw2s
  opencc_config: tw2s.json

output_tw2t:
  option_name: output_tw2t
  opencc_config: tw2t.json

speller:
  algebra:
    - abbrev/^([a-z]).+$/$1/
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/un$/uen/
    - derive/ui$/uei/
    - derive/iu$/iou/

translator:
  dictionary: luna_pinyin
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: false
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  comment_format:
    - xform/^/\v/

reverse_lookup:
  tag: reverse_lookup
  dictionary: cangjie5
  target: translator
  prefix: "`"
  suffix: ";"
  tips: "reverse lookup"
  comment_format:
    - xform/^/\v/

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "^`[a-z']*;?$"

__patch:
  - common:/disable_completion?
  - common:/enable_correction?
  - common:/separate_candidates?
