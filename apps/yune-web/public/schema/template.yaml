# Rime schema template
# encoding: utf-8

schema:
  version: "2023.11.03"
  author:
    - Ayaka Mikazuki <ayaka@mail.shn.hk>
    - LeiMaau <leimaau@qq.com>
    - chaaklau <chaakming@gmail.com>
    - laubonghaudoi <laubonghaudoi@icloud.com>
    - tanxpyox <tanxpyox@gmail.com>
    - William915 <William915@gmail.com>
    - szc126 (@szc126)
    - Bing Jeung <bing@ososo.io>
    - graphemecluster <graphemecluster@gmail.com>
  description: |-
    採用香港語言學學會粵語拼音方案
    https://www.lshk.org/jyutping
    支援聲調顯示同輸入
    Telegram 用户交流組 https://t.me/rime_cantonese

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: full_shape
    states: [ 半形, 全形 ]
  - options: [ noop, variants_hk, trad_tw, simplification ]
    states: [ 傳統漢字, 香港傳統漢字, 臺灣傳統漢字, 大陆简化汉字 ]
    reset: 1
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - dictionary_lookup_filter
    - simplifier
    - simplifier@variants_hk
    - simplifier@trad_tw

dictionary_lookup_filter:
  dictionary: jyut6ping3_scolar

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    __patch:
      - include:/fuzzy
      - include:/tone_ignore
      - include:/abbreviation
      - include:/tone_to_letter

translator:
  dictionary: jyut6ping3
  enable_completion: true
  enable_correction: false
  enable_sentence: true
  enable_user_dict: true
  encode_commit_history: true
  combine_candidates: true
  prediction_never_first: true
  prediction_weight_threshold: 0
  dictionary_exclude: []
  always_show_comments: true
  comment_format:
    - xform/^/\f/

simplifier:
  option_name: simplification
  opencc_config: t2s.json

variants_hk:
  option_name: variants_hk
  opencc_config: t2hkf.json

trad_tw:
  option_name: trad_tw
  opencc_config: t2tw.json

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
