<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">Native Track A latency across all input dimensions: Yune vs librime 1.17.0</title>
  <desc id="desc">Bar = Yune median / same-run upstream librime median; lower is better. Left of the 1x line means Yune is faster. Green = Yune faster, coral = Yune slower; the us figure is the absolute per-call gap (the honest magnitude). Per-key rows sorted fastest-first. Short/pinyin rows from M52; zhongguo + abbreviation rows carried from the 2026-06-29 suite.</desc>
  <rect width="1040" height="540" fill="#FCFCFD"/>
  <text x="28" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F2430">Native Track A latency across all input dimensions: Yune vs librime 1.17.0</text>
  <text x="28" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6F768A">Bar = Yune median / same-run upstream librime median; lower is better. Left of the 1x line means Yune is faster.</text>
  <text x="28" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6F768A">Green = Yune faster, coral = Yune slower; the us figure is the absolute per-call gap (the honest magnitude).</text>
  <text x="28" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6F768A">Per-key rows sorted fastest-first. Short/pinyin rows from M52; zhongguo + abbreviation rows carried from the 2026-06-29 suite.</text>
  <line x1="270.0" y1="111" x2="270.0" y2="514" stroke="#E6E8F0" stroke-width="1"/>
  <text x="270.0" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">0.0x</text>
  <line x1="382.5" y1="111" x2="382.5" y2="514" stroke="#E6E8F0" stroke-width="1"/>
  <text x="382.5" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">0.9x</text>
  <line x1="495.0" y1="111" x2="495.0" y2="514" stroke="#E6E8F0" stroke-width="1"/>
  <text x="495.0" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">1.8x</text>
  <line x1="607.5" y1="111" x2="607.5" y2="514" stroke="#E6E8F0" stroke-width="1"/>
  <text x="607.5" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">2.7x</text>
  <line x1="720.0" y1="111" x2="720.0" y2="514" stroke="#E6E8F0" stroke-width="1"/>
  <text x="720.0" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">3.6x</text>
  <line x1="395.0" y1="109" x2="395.0" y2="514" stroke="#1F2430" stroke-width="2"/>
  <text x="399.0" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#1F2430">1x parity</text>
  <line x1="645.0" y1="109" x2="645.0" y2="514" stroke="#1F2430" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="649.0" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#1F2430">3x gate</text>
  <text x="28" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1F2430">Per-key input latency</text>
  <text x="258" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">zhongguo (common word)</text>
