  <text x="258" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">ni (short key)</text>
  <rect x="270" y="374" width="392.9" height="18" rx="2" fill="#F0986E" stroke="#804126" stroke-width="1"/>
