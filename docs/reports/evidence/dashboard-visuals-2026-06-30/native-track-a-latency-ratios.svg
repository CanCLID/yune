  <text x="353.6" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A">Yune -120 us</text>
  <text x="258" y="184" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">cszysmsrsd (10-char abbr)</text>
