  <text x="711.9" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A">Yune +31 us; ceiling</text>
  <line x1="28" y1="410" x2="1012" y2="410" stroke="#E6E8F0" stroke-width="1"/>
  <text x="28" y="433" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1F2430">One-time lifecycle (near parity, run-noisy)</text>
  <text x="258" y="458" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">startup warm runtime-ready</text>
  <rect x="270" y="444" width="139.1" height="18" rx="2" fill="#BFC6D4" stroke="#868EA0" stroke-width="1"/>
  <text x="415.1" y="458" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1F2430">1.11x</text>
