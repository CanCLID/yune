  <text x="587.2" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A">Yune +13 us</text>
  <text x="258" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">59-char pinyin</text>
  <rect x="270" y="272" width="280.9" height="18" rx="2" fill="#F0986E" stroke="#804126" stroke-width="1"/>
