<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="260" viewBox="0 0 1040 260" role="img" aria-labelledby="title desc">
  <title id="title">Native Track B memory: TypeDuck jyut6ping3 product path</title>
  <desc id="desc">Native TypeDuck jyut6ping3 product lane, working set / private in MB. No librime peer (TypeDuck is a fork). Current 2026-06-29 after M47 byte-backing; prior 2026-06-28 shown as 'was'.</desc>
