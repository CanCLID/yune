  <text x="258" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">Browser Jyutping memory (guard)</text>
  <rect x="270" y="232" width="88.2" height="18" rx="2" fill="#BFC6D4" stroke="#868EA0" stroke-width="1"/>
