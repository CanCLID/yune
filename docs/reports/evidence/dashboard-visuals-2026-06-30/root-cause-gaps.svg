  <text x="382.5" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">3x</text>
  <line x1="495.0" y1="95" x2="495.0" y2="302" stroke="#E6E8F0" stroke-width="1"/>
  <text x="495.0" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">6x</text>
  <line x1="607.5" y1="95" x2="607.5" y2="302" stroke="#E6E8F0" stroke-width="1"/>
  <text x="607.5" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">9x</text>
  <line x1="720.0" y1="95" x2="720.0" y2="302" stroke="#E6E8F0" stroke-width="1"/>
  <text x="720.0" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A" text-anchor="middle">12x</text>
  <line x1="307.5" y1="93" x2="307.5" y2="302" stroke="#1F2430" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="311.5" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#1F2430">1x parity</text>
  <text x="258" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500" fill="#1F2430" text-anchor="end">Native Track A peak memory</text>
  <rect x="270" y="96" width="408.8" height="18" rx="2" fill="#F2C879" stroke="#9C7B1E" stroke-width="1"/>
