  <rect x="270" y="266" width="59.1" height="18" rx="2" fill="#F2C879" stroke="#9C7B1E" stroke-width="1"/>
  <text x="335.1" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1F2430">1.58x</text>
  <text x="378.1" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6F768A">1000 vs 634 ms; watch</text>
