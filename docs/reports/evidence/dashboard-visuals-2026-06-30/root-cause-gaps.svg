<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="328" viewBox="0 0 1040 328" role="img" aria-labelledby="title desc">
  <title id="title">Current performance gaps by lane (Yune / peer ratio)</title>
  <desc id="desc">Native Track A refreshed by M52, 2026-06-30; browser rows carried from 2026-06-28. Lower is better; dashed line = 1.0x peer parity. Jyutping browser row is guard-only (different dictionary).</desc>
  <rect width="1040" height="328" fill="#FCFCFD"/>
  <text x="28" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F2430">Current performance gaps by lane (Yune / peer ratio)</text>
  <text x="28" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6F768A">Native Track A refreshed by M52, 2026-06-30; browser rows carried from 2026-06-28.</text>
  <text x="28" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6F768A">Lower is better; dashed line = 1.0x peer parity. Jyutping browser row is guard-only (different dictionary).</text>
  <line x1="270.0" y1="95" x2="270.0" y2="302" stroke="#E6E8F0" stroke-width="1"/>
