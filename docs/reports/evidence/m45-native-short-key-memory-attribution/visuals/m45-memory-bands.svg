<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-labelledby="title desc">
  <title id="title">M45 memory steady-state and peak bands</title>
  <desc id="desc">Steady Track A working-set rows are below target, but the peak remains above target.</desc>
  <rect width="820" height="360" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M45 Memory Bands</text>
  <text x="32" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Steady resident target: 107,797,708 B. Peak still records the real cold-start high-water cost.</text>
  <line x1="582" y1="96" x2="582" y2="286" stroke="#0f766e" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="590" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0f766e">resident target</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="58" y="128" fill="#111827">session steady</text>
    <rect x="210" y="110" width="373" height="22" rx="4" fill="#16a34a"/>
    <text x="596" y="127" fill="#111827">87,498,752 B</text>

    <text x="58" y="168" fill="#111827">n steady</text>
    <rect x="210" y="150" width="388" height="22" rx="4" fill="#16a34a"/>
    <text x="612" y="167" fill="#111827">91,058,176 B</text>

    <text x="58" y="208" fill="#111827">hao steady</text>
    <rect x="210" y="190" width="395" height="22" rx="4" fill="#16a34a"/>
    <text x="619" y="207" fill="#111827">92,749,824 B</text>

    <text x="58" y="248" fill="#111827">abbr steady high</text>
    <rect x="210" y="230" width="421" height="22" rx="4" fill="#16a34a"/>
    <text x="645" y="247" fill="#111827">98,684,928 B</text>

    <text x="58" y="288" fill="#111827">Track A peak</text>
    <rect x="210" y="270" width="544" height="22" rx="4" fill="#dc2626"/>
    <text x="604" y="316" fill="#111827">127,475,712 B peak blocker</text>
  </g>
</svg>
