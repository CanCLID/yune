<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
  <title id="title">WEB-03 Jyutping long-input latency regression fix</title>
  <desc id="desc">Bar chart comparing the deployed WEB-03 long-input regression against the rebuilt local fix. Lower input-to-paint latency is better; WASM memory remains 160 MiB.</desc>
  <rect width="1080" height="470" fill="#ffffff"/>
  <text x="42" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">WEB-03 Jyutping latency follow-up</text>
  <text x="42" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Public deployed regression before this fix vs rebuilt local public-demo after bounded fallback expansion. Lower is better.</text>
  <rect x="42" y="90" width="14" height="14" rx="2" fill="#dc2626"/>
  <text x="64" y="102" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">deployed pre-fix</text>
  <rect x="200" y="90" width="14" height="14" rx="2" fill="#0f766e"/>
  <text x="222" y="102" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">local rebuilt fix</text>
  <text x="174" y="133" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111827" text-anchor="end">caksi</text>
  <rect x="190" y="115" width="60" height="18" rx="3" fill="#dc2626"/>
  <text x="258" y="129" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7f1d1d">299 ms</text>
  <rect x="190" y="141" width="18" height="18" rx="3" fill="#0f766e"/>
  <text x="216" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#134e4a">89 ms</text>
  <text x="174" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111827" text-anchor="end">ngogokdak</text>
  <rect x="190" y="187" width="32" height="18" rx="3" fill="#dc2626"/>
  <text x="230" y="201" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7f1d1d">160 ms</text>
  <rect x="190" y="213" width="4" height="18" rx="3" fill="#0f766e"/>
  <text x="202" y="227" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#134e4a">22 ms</text>
  <text x="174" y="277" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111827" text-anchor="end">28-char Jyutping</text>
  <rect x="190" y="259" width="760" height="18" rx="3" fill="#dc2626"/>
  <text x="958" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7f1d1d">3764 ms</text>
  <rect x="190" y="285" width="26" height="18" rx="3" fill="#0f766e"/>
  <text x="224" y="299" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#134e4a">130 ms</text>
  <text x="174" y="349" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111827" text-anchor="end">52-char Jyutping</text>
  <rect x="190" y="331" width="307" height="18" rx="3" fill="#dc2626"/>
  <text x="505" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7f1d1d">1518 ms</text>
  <rect x="190" y="357" width="15" height="18" rx="3" fill="#0f766e"/>
  <text x="213" y="371" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#134e4a">74 ms</text>
  <line x1="190" y1="395" x2="950" y2="395" stroke="#cbd5e1"/>
  <text x="190" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">0 ms</text>
  <text x="950" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="end">3764 ms</text>
  <text x="42" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Source: apps/yune-web/e2e/results/web03-latency-regression-fix/local-browser-latency plus live deployed probe on 2026-06-28. Memory stayed at 160.0 MiB.</text>
</svg>
