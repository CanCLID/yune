<svg xmlns="http://www.w3.org/2000/svg" width="980" height="370" viewBox="0 0 980 370" role="img" aria-labelledby="title desc">
  <title id="title">Ready-to-input browser startup comparison</title>
  <desc id="desc">Bar chart comparing My RIME and Yune ready-to-input times for Luna Pinyin and Jyutping.</desc>
  <rect width="980" height="370" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Ready-to-input startup</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Lower is better. Yune is interactive, but still starts later than the My RIME baseline on both schemas.</text>

  <line x1="700" x2="700" y1="90" y2="270" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="674" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">1000 ms</text>

  <text x="40" y="113" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">My RIME Luna Pinyin</text>
  <rect x="300" y="100" width="219" height="18" rx="4" fill="#2563eb"/>
  <text x="532" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">547 ms</text>

  <text x="40" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">Yune Luna Pinyin</text>
  <rect x="300" y="135" width="306" height="18" rx="4" fill="#d97706"/>
  <text x="619" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">764 ms (+217)</text>

  <text x="40" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">My RIME Jyutping</text>
  <rect x="300" y="205" width="358" height="18" rx="4" fill="#2563eb"/>
  <text x="671" y="219" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">894 ms</text>

  <text x="40" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">Yune Jyutping</text>
  <rect x="300" y="240" width="466" height="18" rx="4" fill="#d97706"/>
  <text x="779" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">1164 ms (+270)</text>

  <rect x="40" y="300" width="900" height="38" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="58" y="324" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Current read: startup is secondary to heap, but the final WEB-01 gate should still reject more than 10% regression.</text>
</svg>
