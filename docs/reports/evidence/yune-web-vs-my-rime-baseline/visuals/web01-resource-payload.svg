<svg xmlns="http://www.w3.org/2000/svg" width="980" height="370" viewBox="0 0 980 370" role="img" aria-labelledby="title desc">
  <title id="title">Unique encoded browser resource payload comparison</title>
  <desc id="desc">Bar chart comparing unique encoded browser resource payload for My RIME and Yune across Luna Pinyin and Jyutping.</desc>
  <rect width="980" height="370" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Unique encoded browser resources</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Lower is better. Yune Luna is already smaller; Jyutping is the payload optimization target.</text>

  <line x1="704" x2="704" y1="90" y2="270" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="682" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#166534">28 MiB WEB-01 target</text>
  <line x1="784" x2="784" y1="90" y2="270" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="750" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#991b1b">33.5 MiB Yune baseline</text>

  <text x="40" y="113" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">My RIME Luna Pinyin</text>
  <rect x="300" y="100" width="123" height="18" rx="4" fill="#2563eb"/>
  <text x="436" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">8.5 MiB</text>

  <text x="40" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">Yune Luna Pinyin</text>
  <rect x="300" y="135" width="78" height="18" rx="4" fill="#16a34a"/>
  <text x="391" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">5.4 MiB</text>

  <text x="40" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">My RIME Jyutping</text>
  <rect x="300" y="205" width="360" height="18" rx="4" fill="#2563eb"/>
  <text x="673" y="219" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">24.9 MiB</text>

  <text x="40" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">Yune Jyutping</text>
  <rect x="300" y="240" width="484" height="18" rx="4" fill="#dc2626"/>
  <text x="798" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#991b1b">33.5 MiB (+8.6)</text>

  <rect x="40" y="300" width="900" height="38" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="58" y="324" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">Current read: payload pruning should focus on eager Jyutping reverse/shared assets, not Luna Pinyin.</text>
</svg>
